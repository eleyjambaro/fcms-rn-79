buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24
        compileSdkVersion = 35
        targetSdkVersion = 35
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.0.21"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

// Add this block below to fix the "CompileSdkVersion 30" error
allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// Replace the problematic allprojects/subprojects block with this:
subprojects {
    configurations.all {
        resolutionStrategy {
            // Force MMKV 1.3.16 globally (Latest 16KB compliant version)
            force 'com.tencent:mmkv:1.3.16'
            
            // Also force it via eachDependency for extra insurance
            eachDependency { DependencyResolveDetails details ->
                if (details.requested.group == 'com.tencent' && details.requested.name == 'mmkv') {
                    details.useVersion '1.3.16'
                    details.because '1.3.16 supports 16KB page alignment'
                }
                // Your existing support lib fix
                if (details.requested.group == 'com.android.support' && !details.requested.name.contains('multidex')) {
                    details.useVersion "28.0.0"
                }
            }
        }
    }
}